version: '3.8'

services:
  splunk:
    image: splunk/splunk:latest
    container_name: splunk
    environment:
      - SPLUNK_START_ARGS=--accept-license
      - SPLUNK_PASSWORD=changeme
      - SPLUNK_HEC_TOKEN=hec_token_12345
    ports:
      - "8000:8000"
      - "8088:8088"
      - "8089:8089"
    volumes:
      - splunk-data:/opt/splunk
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000"]
      interval: 30s
      timeout: 10s
      retries: 5

  forwarder:
    image: splunk/universalforwarder:latest
    container_name: forwarder
    user: root 
    # command: /sbin/entrypoint.sh start-service
    environment:
      - SPLUNK_START_ARGS=--accept-license
      - SPLUNK_PASSWORD=StrongPass123!
      # - SPLUNK_ADD=monitor /var/lib/docker/containers
      # - SPLUNK_STANDALONE_URL=splunk
    volumes:
      - ./forwarder-app/inputs.conf:/opt/splunkforwarder/etc/system/local/inputs.conf
      - ./forwarder-app/outputs.conf:/opt/splunkforwarder/etc/system/local/outputs.conf
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - nginx-logs:/var/log/nginx:ro
    depends_on:
      - splunk



  juice-shop:
    image: bkimminich/juice-shop
    container_name: juice-shop
    ports:
      - "3000:3000"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    depends_on:
      - forwarder
  nginx:
    image: nginx:latest
    container_name: nginx
    ports:
      - "8080:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - nginx-logs:/var/log/nginx
    depends_on:
      - juice-shop
volumes:
  splunk-data:
  nginx-logs:
